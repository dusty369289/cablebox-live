<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="description" content="CableBox — retro 90s cable TV experience for YouTube" />
		<meta name="theme-color" content="#000000" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta http-equiv="Content-Security-Policy"
			content="default-src 'self';
				script-src 'self' https://www.youtube.com https://s.ytimg.com 'unsafe-inline';
				frame-src https://www.youtube.com https://www.youtube-nocookie.com;
				img-src 'self' https://img.youtube.com https://i.ytimg.com data:;
				style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
				font-src https://fonts.gstatic.com;
				connect-src 'self';" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=VT323&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
