name: Refresh channel data

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC daily
  workflow_dispatch: # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build channel data
        run: npm run build:channels
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Update gist
        run: |
          if [ ! -s static/data/channels.json ]; then
            echo "Error: static/data/channels.json is missing or empty"
            exit 1
          fi
          jq -n --rawfile content static/data/channels.json \
            '{files: {"channels.json": {content: $content}}}' \
            | gh api -X PATCH /gists/5ec22d2a61f18d920b9c8c4d19a31303 --input -
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
