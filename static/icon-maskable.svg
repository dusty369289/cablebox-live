  <rect x="148" y="168" width="48" height="20" rx="2" fill="#ffff00" opacity="0.7"/>
  <rect x="204" y="168" width="80" height="20" rx="2" fill="#00ffff" opacity="0.4"/>
  <rect x="292" y="168" width="72" height="20" rx="2" fill="#00ffff" opacity="0.3"/>
  <rect x="148" y="196" width="48" height="20" rx="2" fill="#ffff00" opacity="0.7"/>
  <rect x="204" y="196" width="120" height="20" rx="2" fill="#00ffff" opacity="0.4"/>
  <rect x="332" y="196" width="32" height="20" rx="2" fill="#00ffff" opacity="0.3"/>
  <rect x="148" y="224" width="48" height="20" rx="2" fill="#ffff00" opacity="0.7"/>
